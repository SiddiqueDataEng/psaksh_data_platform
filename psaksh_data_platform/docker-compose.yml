version: "3.9"

# Local development stack for psaksh Data Platform
# Provides MySQL warehouse + MinIO (S3-compatible object storage)

services:

  mysql:
    image: mysql:8.0
    container_name: psaksh_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: psaksh_warehouse
      MYSQL_USER: psaksh_user
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./warehouse/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "psaksh_user", "-pchangeme"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: psaksh_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: Airflow for pipeline scheduling
  # Uncomment to enable workflow orchestration
  # airflow:
  #   image: apache/airflow:2.9.1
  #   container_name: psaksh_airflow
  #   environment:
  #     AIRFLOW__CORE__EXECUTOR: LocalExecutor
  #     AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://psaksh_user:changeme@mysql/psaksh_warehouse
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     mysql:
  #       condition: service_healthy

volumes:
  mysql_data:
  minio_data:
